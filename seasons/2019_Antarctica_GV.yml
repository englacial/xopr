version: 1.0.0
data:
  root: /kucresis/scratch/dataproducts/public/data/rds
  provider: utig
  primary_product: CSARP_standard
  extra_products:
  - CSARP_qlook
  - CSARP_qlook_coh
  - CSARP_layer
  campaigns:
    include:
    - 2019_Antarctica_GV
    exclude: []
  campaign_filter: ''
output:
  path: ../catalog/2008_Antarctica_BaslerJKB
  catalog_id: OPR-CReSIS
  catalog_description: Open Polar Radar UTIG airborne data
  license: various
processing:
  n_workers: 20
  memory_limit: 8GB
  max_items: null
assets:
  base_url: https://data.cresis.ku.edu/data/rds/
logging:
  verbose: false
  level: INFO
geometry:
  simplify: true
  tolerance: 100.0
sci:
  citation: "Blankenship, D. D., Kempf, S. D., Young, D. A., Richter, T. G., Schroeder, D. M., Greenbaum, J. S., van Ommen, T., Warner, R. C., Roberts, J. L., Young, N. W., Lemeur, E., Siegert, M. J. & Holt, J. W. (2017). IceBridge HiCARS 1 L1B Time-Tagged Echo Strength Profiles. (IR1HI1B, Version 1). [Data Set]. Boulder, Colorado USA. NASA National Snow and Ice Data Center Distributed Active Archive Center. https://doi.org/10.5067/W2KXX0MYNJ9G.

The collection of this data was funded by a variety of sources, including NASA's Operation Ice
Bridge (grants NNX09AR52G, NNG10HP06C and NNX11AD33G) and National Science
Foundation grant PLR-0733025 to the University of Texas at Austin, the United Kingdom's National
Environmental Research Council grant NE/F016646/1, and Australia's Antarctic Climate and
Ecosystems Collaborative Research Center. Logistical support was provided by the United States
Antarctic Program, the Australian Antarctic Program (through projects 3103 and 4077), the French
Polar Institute and Italy's Programma Nazionale Di Ricerche In Antartide."
  doi: "10.5067/W2KXX0MYNJ9G"
  override: true
